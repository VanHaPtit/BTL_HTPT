spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/docsEngine?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.docker.compose.file=../compose.yaml
spring.docker.compose.enabled=false

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:127.0.0.1}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:16379}
spring.data.redis.repositories.enabled=false

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# Logging
logging.level.org.springframework.web.socket=DEBUG
logging.level.com.mwang.backend=DEBUG

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
info.app.name=collaborative-doc-engine
info.app.description=Real-time collaborative document editing backend

# JWT — set JWT_SECRET env var in any real deployment; never use the default in production
jwt.secret=${JWT_SECRET:PZQhbm2pxG2uTlbcHMxwTB4amG59/+uK+nYbCV/4u4o=}
jwt.expiration-ms=86400000

# Resync rate limit — permits per minute per (user, document)
collaboration.resync.rate-limit=30

# Accepted-operation outbox
collaboration.outbox.fixed-delay-ms=1000
collaboration.outbox.batch-size=25
collaboration.outbox.max-attempts=10

# Document checkpoints
collaboration.checkpoint.interval=20


